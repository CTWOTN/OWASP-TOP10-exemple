<!DOCTYPE html>
<html>

<head>
    <title>PyYAML Vulnerability Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
        }

        textarea {
            width: 100%;
            height: 200px;
        }

        .output {
            margin-top: 20px;
            padding: 10px;
            background: #f4f4f4;
            border: 1px solid #ccc;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

    <h2>Unsafe YAML Deserialization Demo (PyYAML 5.3.1)</h2>

    <form method="POST">
        <label>Enter YAML:</label><br><br>
        <textarea name="yaml_input"></textarea><br><br>
        <button type="submit">Deserialize</button>
    </form>

    <div class="output">
        <h3>Output:</h3>
        <pre>{{ output }}</pre>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
    </div>

</body>

</html>
